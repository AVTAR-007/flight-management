<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#deb15e" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#aa8632" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f2e" />
      <stop offset="100%" stop-color="#060a22" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.4" />
  
  <!-- Stylized Airplane and Wings Emblem -->
  <g transform="translate(256, 256)">
    <!-- Wings -->
    <path d="M-180,-30 C-100,-70 -30,-50 0,0 C30,-50 100,-70 180,-30 C120,40 50,20 0,60 C-50,20 -120,40 -180,-30 Z" fill="url(#goldGrad)" />
    <!-- Inner details -->
    <path d="M-140,-15 C-80,-40 -20,-30 0,0 C20,-30 80,-40 140,-15 C90,25 40,15 0,40 C-40,15 -90,25 -140,-15 Z" fill="#0a0f2e" opacity="0.3" />
    <!-- Jet Fuselage/Nose -->
    <path d="M-15,-90 L15,-90 L20,-10 L35,30 L0,80 L-35,30 L-20,-10 Z" fill="url(#goldGrad)" />
    <!-- Cabin Window/Diamond Accent -->
    <polygon points="0,-75 8,-50 0,-25 -8,-50" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
